<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Отчеты - Админка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/jpeg" href="/images/icona.jpg">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark admin-nav">
        <div class="container">
            <a class="navbar-brand" href="/admin">⚙️ Жемчужина Админ</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/admin">Дашборд</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/trainers">Тренеры</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/subscriptions">Абонементы</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/schedules">Расписание</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/attendance">Посещаемость</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/admin/reports">Отчеты</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">На сайт</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logout">Выйти</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h1 class="mb-4">Финансовые отчеты</h1>

        <div class="card mb-4">
            <div class="card-body">
                <form method="post" th:action="@{/admin/reports/filter}" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Тренер</label>
                        <select name="trainerId" class="form-select">
                            <option value="">Все тренеры</option>
                            <option th:each="t : ${trainers}" th:value="${t.id}" th:text="${t.name}"
                                    th:selected="${selectedTrainerId != null and selectedTrainerId == t.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Дата с</label>
                        <input type="date" name="startDate" class="form-control" th:value="${startDate}" required>
                    </div>
                    <div class="col-md-3">
                        <label class="form-label fw-bold">Дата по</label>
                        <input type="date" name="endDate" class="form-control" th:value="${endDate}" required>
                    </div>
                    <div class="col-md-2 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary w-100">Фильтр</button>
                    </div>
                </form>
            </div>
        </div>

        <div class="card">
            <div class="card-body text-center py-5">
                <h3 class="text-muted mb-2">Выручка за период</h3>
                <p class="text-muted mb-3">
                    с <strong th:text="${startDate}"></strong> по <strong th:text="${endDate}"></strong>
                </p>
                <div class="display-3 text-success fw-bold">
                    <span th:text="${#numbers.formatDecimal(revenue, 0, 'COMMA', 0, 'POINT')}"></span> ₽
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
