<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Расписание - Админка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/jpeg" href="/images/icona.jpg">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark admin-nav">
        <div class="container">
            <a class="navbar-brand" href="/admin">⚙️ Жемчужина Админ</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/admin">Дашборд</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/trainers">Тренеры</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/subscriptions">Абонементы</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/admin/schedules">Расписание</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/attendance">Посещаемость</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/reports">Отчеты</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">На сайт</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logout">Выйти</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h1 class="mb-4">Управление расписанием</h1>

        <div class="row g-4">
            <div class="col-md-5">
                <div class="card">
                    <div class="card-header bg-primary text-white fw-bold">
                        ➕ Добавить занятие
                    </div>
                    <div class="card-body">
                        <form method="post" th:action="@{/admin/schedules/save}">
                            <input type="hidden" name="id">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Тренер</label>
                                <select name="trainerId" class="form-select" required>
                                    <option th:each="t : ${trainers}" th:value="${t.id}" th:text="${t.name}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Группа</label>
                                <select name="groupId" class="form-select" required>
                                    <option th:each="g : ${groups}" th:value="${g.id}" th:text="${g.name}"></option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">День недели</label>
                                <select name="dayOfWeek" class="form-select" required>
                                    <option th:each="d : ${days}" th:value="${d}" th:text="${d}"></option>
                                </select>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Начало</label>
                                    <input type="time" name="startTime" class="form-control" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Конец</label>
                                    <input type="time" name="endTime" class="form-control" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Макс. мест</label>
                                <input type="number" name="maxCapacity" class="form-control" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Сохранить</button>
                        </form>
                    </div>
                </div>
            </div>
            <div class="col-md-7">
                <div class="card">
                    <div class="card-header bg-dark text-white fw-bold">
                        📋 Текущее расписание
                    </div>
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-custom">
                                <thead>
                                    <tr>
                                        <th>День</th>
                                        <th>Время</th>
                                        <th>Тренер</th>
                                        <th>Группа</th>
                                        <th>Мест</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    <tr th:each="s : ${schedules}">
                                        <td><span class="badge bg-soft-primary" th:text="${s.dayOfWeek}"></span></td>
                                        <td th:text="${s.startTime} + '-' + ${s.endTime}"></td>
                                        <td th:text="${s.trainer != null ? s.trainer.name : '—'}"></td>
                                        <td th:text="${s.trainingGroup != null ? s.trainingGroup.name : '—'}"></td>
                                        <td th:text="${s.maxCapacity}"></td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
