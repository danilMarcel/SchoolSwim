<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Регистрация - Школа плавания Жемчужина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/jpeg" href="/images/icona.jpg">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🏊 <span>Жемчужина</span></a>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Регистрация</h2>
                        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                        <form method="post" th:action="@{/register}" th:object="${user}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Имя пользователя *</label>
                                <input type="text" th:field="*{username}" class="form-control" required>
                                <div class="text-danger" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">ФИО</label>
                                <input type="text" th:field="*{fullName}" class="form-control" placeholder="Иванов Иван Иванович">
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Email</label>
                                    <input type="email" th:field="*{email}" class="form-control" placeholder="ivan@example.com">
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Телефон</label>
                                    <input type="tel" th:field="*{phone}" class="form-control" placeholder="+7 (999) 123-45-67">
                                </div>
                            </div>
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Пароль *</label>
                                    <input type="password" th:field="*{password}" class="form-control" required>
                                    <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">Подтвердите пароль *</label>
                                    <input type="password" th:field="*{confirmPassword}" class="form-control" required>
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Зарегистрироваться</button>
                        </form>
                        <div class="text-center mt-3">
                            <p class="text-muted">Уже есть аккаунт? <a href="/login">Войти</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Школа плавания &laquo;Жемчужина&raquo;</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
