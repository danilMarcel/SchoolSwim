<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Посещаемость - Админка</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/jpeg" href="/images/icona.jpg">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark admin-nav">
        <div class="container">
            <a class="navbar-brand" href="/admin">⚙️ Жемчужина Админ</a>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/admin">Дашборд</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/trainers">Тренеры</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/subscriptions">Абонементы</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/schedules">Расписание</a></li>
                    <li class="nav-item"><a class="nav-link active" href="/admin/attendance">Посещаемость</a></li>
                    <li class="nav-item"><a class="nav-link" href="/admin/reports">Отчеты</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/">На сайт</a></li>
                    <li class="nav-item"><a class="nav-link" href="/logout">Выйти</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-4">
        <h1 class="mb-4">Отметка посещаемости</h1>

        <div class="card mb-4">
            <div class="card-body">
                <form method="post" th:action="@{/admin/attendance/load}" class="row g-3">
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Тренер</label>
                        <select name="trainerId" class="form-select" required>
                            <option th:each="t : ${trainers}" th:value="${t.id}" th:text="${t.name}"
                                    th:selected="${selectedTrainerId != null and selectedTrainerId == t.id}"></option>
                        </select>
                    </div>
                    <div class="col-md-4">
                        <label class="form-label fw-bold">Дата</label>
                        <input type="date" name="date" class="form-control"
                               th:value="${selectedDate != null ? selectedDate : today}" required>
                    </div>
                    <div class="col-md-4 d-flex align-items-end">
                        <button type="submit" class="btn btn-primary">Загрузить</button>
                    </div>
                </form>
            </div>
        </div>

        <div th:if="${bookings != null and !bookings.isEmpty()}" class="card">
            <div class="card-header bg-dark text-white fw-bold">
                📋 Записи на <span th:text="${selectedDate}"></span>
            </div>
            <div class="card-body">
                <div class="table-responsive">
                    <table class="table table-custom">
                        <thead>
                            <tr>
                                <th>Клиент</th>
                                <th>Время</th>
                                <th>Абонемент</th>
                                <th>Статус</th>
                                <th>Действие</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="b : ${bookings}">
                                <td th:text="${b.user.fullName}"></td>
                                <td th:text="${b.schedule.startTime} + ' - ' + ${b.schedule.endTime}"></td>
                                <td th:text="${b.userSubscription.subscription.name}"></td>
                                <td>
                                    <span th:if="${b.status == 'CONFIRMED'}" class="badge bg-primary">Подтверждено</span>
                                    <span th:if="${b.status == 'COMPLETED'}" class="badge bg-success">Посещено</span>
                                    <span th:if="${b.status == 'CANCELLED'}" class="badge bg-danger">Отменено</span>
                                </td>
                                <td>
                                    <div th:if="${b.status == 'CONFIRMED'}">
                                        <form method="post" th:action="@{/admin/attendance/mark}" style="display:inline">
                                            <input type="hidden" name="bookingId" th:value="${b.id}">
                                            <input type="hidden" name="trainerId" th:value="${selectedTrainerId}">
                                            <input type="hidden" name="date" th:value="${selectedDate}">
                                            <input type="hidden" name="attended" value="true">
                                            <button type="submit" class="btn btn-sm btn-success">✅ Пришёл</button>
                                        </form>
                                        <form method="post" th:action="@{/admin/attendance/mark}" style="display:inline">
                                            <input type="hidden" name="bookingId" th:value="${b.id}">
                                            <input type="hidden" name="trainerId" th:value="${selectedTrainerId}">
                                            <input type="hidden" name="date" th:value="${selectedDate}">
                                            <input type="hidden" name="attended" value="false">
                                            <button type="submit" class="btn btn-sm btn-danger">❌ Не пришёл</button>
                                        </form>
                                    </div>
                                    <span th:if="${b.status != 'CONFIRMED'}" class="text-muted">Обработано</span>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div th:if="${bookings != null and bookings.isEmpty()}" class="alert alert-info">
            Нет записей на выбранную дату.
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
