<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Вход - Школа плавания Жемчужина</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="icon" type="image/jpeg" href="/images/icona.jpg">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand" href="/">🏊 <span>Жемчужина</span></a>
        </div>
    </nav>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h2 class="text-center mb-4">Вход в систему</h2>
                        <div th:if="${param.error}" class="alert alert-danger">Неверное имя пользователя или пароль</div>
                        <div th:if="${param.registered}" class="alert alert-success">Регистрация успешна! Войдите в систему.</div>
                        <div th:if="${param.logout}" class="alert alert-info">Вы вышли из системы.</div>
                        <form method="post" th:action="@{/login}">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Имя пользователя</label>
                                <input type="text" name="username" class="form-control" required placeholder="Введите логин">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Пароль</label>
                                <input type="password" name="password" class="form-control" required placeholder="Введите пароль">
                            </div>
                            <button type="submit" class="btn btn-primary w-100 py-2">Войти</button>
                        </form>
                        <div class="text-center mt-3">
                            <p class="text-muted">Нет аккаунта? <a href="/register">Зарегистрироваться</a></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 Школа плавания &laquo;Жемчужина&raquo;</p>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
